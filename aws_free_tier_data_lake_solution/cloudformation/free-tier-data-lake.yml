AWSTemplateFormatVersion: "2010-09-09"
Description: Minimal low-cost AWS data lake using S3, Glue Data Catalog, and Athena.

Parameters:
  ProjectName:
    Type: String
    Default: yu-free-datalake
    AllowedPattern: "^[a-z0-9-]+$"
    Description: Lowercase project name used in bucket names.

Resources:

  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}-raw"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireSmallDemoFiles
            Status: Enabled
            ExpirationInDays: 30

  CuratedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}-curated"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireSmallDemoFiles
            Status: Enabled
            ExpirationInDays: 30

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}-athena-results"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAthenaResults
            Status: Enabled
            ExpirationInDays: 7

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "${ProjectName}_db"
        Description: Free-tier demo data lake database.

  SalesCsvTable:
    Type: AWS::Glue::Table
    DependsOn: GlueDatabase
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: sales_csv
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: csv
          skip.header.line.count: "1"
        StorageDescriptor:
          Location: !Sub "s3://${RawBucket}/sales/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.serde2.OpenCSVSerde
            Parameters:
              separatorChar: ","
              quoteChar: '"'
          Columns:
            - Name: order_id
              Type: string
            - Name: customer_id
              Type: string
            - Name: event
              Type: string
            - Name: amount
              Type: double
            - Name: event_date
              Type: string
            - Name: product_category
              Type: string

  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${ProjectName}-workgroup"
      Description: Low-cost Athena workgroup for demo data lake queries.
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        ResultConfiguration:
          OutputLocation: !Sub "s3://${AthenaResultsBucket}/query-results/"

Outputs:
  RawBucketName:
    Value: !Ref RawBucket
  CuratedBucketName:
    Value: !Ref CuratedBucket
  AthenaResultsBucketName:
    Value: !Ref AthenaResultsBucket
  GlueDatabaseName:
    Value: !Ref GlueDatabase
  GlueTableName:
    Value: sales_csv
  AthenaWorkGroupName:
    Value: !Ref AthenaWorkGroup
